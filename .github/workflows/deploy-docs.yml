name: Deploy MkDocs to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install mkdocs-material
      - name: Assemble docs into _docs/
        run: |
          mkdir -p _docs/certstore
          cp README.md "環境與架構.md" "HTTPS-主機名設定.md" "憑證信任重現與排查.md" _docs/
          cp certstore/README.md _docs/certstore/
          cp -r images _docs/
      - run: mkdocs build --site-dir "$RUNNER_TEMP/site"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
